version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: mrds-api:latest
    container_name: mrds-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Map the local database file to persist data across container restarts
      - ./mrds.db:/app/mrds.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
